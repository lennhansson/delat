<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Önska Låt - Jukebox</title>
    <script src="/socket.io/socket.io.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        body { background: #0b0b0b; color: white; font-family: system-ui, sans-serif; padding: 15px; margin: 0; }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        h1 { font-size: 20px; margin: 0; }
        .accent { color: #1db954; }
        
        .reload-btn { background: #222; color: #aaa; border: 1px solid #444; border-radius: 6px; padding: 6px 12px; font-size: 12px; cursor: pointer; }
        .share-btn { display: block; width: 100%; padding: 12px; background: #007aff; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 14px; cursor: pointer; text-align: center; margin-bottom: 15px; }

        /* Fliksystem */
        .tabs-nav { display: flex; gap: 5px; margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 8px; }
        .tab-btn { flex: 1; padding: 10px; background: #1a1a1e; color: #888; border: 1px solid #333; border-radius: 6px; font-weight: bold; font-size: 13px; cursor: pointer; }
        .tab-btn.active { background: #1db954; color: black; border-color: #1db954; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Kupongsektion */
        .kupong-box { background: #1a1a1e; border: 1px solid #333; padding: 12px; border-radius: 8px; margin-bottom: 15px; display: none; }
        .kupong-box label { font-size: 13px; color: #aaa; display: block; margin-bottom: 5px; }
        .kupong-box input { width: 100%; padding: 10px; background: #111; border: 1px solid #444; color: white; border-radius: 6px; font-size: 15px; box-sizing: border-box; font-weight: bold; text-transform: uppercase; }

        /* Sök */
        .search-box { display: flex; gap: 8px; margin-bottom: 15px; }
        .search-box input { flex: 1; padding: 12px; background: #111; border: 1px solid #222; color: white; border-radius: 8px; font-size: 16px; }
        .search-box button { background: #1db954; color: black; border: none; padding: 0 16px; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; }

        /* Listor och boxar */
        .item-box { background: #111; border: 1px solid #222; border-radius: 8px; padding: 12px; margin-bottom: 15px; }
        .row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #222; }
        .row:last-child { border-bottom: none; }
        .row img { width: 50px; height: 50px; border-radius: 4px; object-fit: cover; }
        
        .add-btn { background: #1db954; color: black; border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; font-size: 13px; cursor: pointer; margin-left: auto; }
        #now-playing-text { color: #ffcc00; font-weight: bold; font-size: 15px; }

        /* QR-flikens specifika stil */
        .qr-container { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; background: #111; border-radius: 8px; border: 1px solid #222; text-align: center; }
        
        /* Den lokala QR-koden behöver lite vit marginal för att kameror ska kunna läsa den */
        #qr-kod-plats { background: white; padding: 15px; border-radius: 8px; display: inline-block; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="header-row">
        <h1 id="pub-titel">Laddar <span class="accent">Jukebox...</span></h1>
        <button class="reload-btn" onclick="window.location.reload()">🔄 Ladda om</button>
    </div>
    
    <button class="share-btn" onclick="delaTillPolarna()">DELA LÄNK MED BORDET 🚀</button>

    <div id="kupong-sektion" class="kupong-box">
        <label for="kupong-input">SKRIV IN KOD FRÅN PAPPPERSLAPPEN:</label>
        <input type="text" id="kupong-input" placeholder="T.EX. 1024-A4B2C8">
    </div>

    <div class="item-box" style="border-color: #ffcc00; text-align: center;">
        <small style="color:#888;">JUST NU I HÖGTALARNA:</small>
        <div id="now-playing-text">Hämtar status...</div>
    </div>

    <div class="tabs-nav">
        <button id="btn-tab-sok" class="tab-btn active" onclick="bytFlik('sok')">🔍 Sök & Önska</button>
        <button id="btn-tab-qr" class="tab-btn" onclick="bytFlik('qr')">📱 Visa QR-kod</button>
    </div>

    <div id="tab-sok" class="tab-content active">
        <div class="search-box">
            <input type="text" id="query" placeholder="Sök låt eller artist...">
            <button onclick="sök()">SÖK</button>
        </div>
        <div id="results"></div>
    </div>

    <div id="tab-qr" class="tab-content">
        <div class="qr-container">
            <p style="margin-top:0; font-size:14px; color:#aaa;">Låt polarna skanna din skärm för att hoppa in i kön!</p>
            <div id="qr-kod-plats"></div>
            <br>
            <small style="color:#666; word-break: break-all; margin-top:5px;" id="qr-lank-text"></small>
        </div>
    </div>

    <div class="item-box" style="margin-top: 15px;">
        <h3 style="margin-top:0; font-size:14px; color:#888;">KOMMANDE LÅTAR:</h3>
        <div id="queue-lista">Laddar kö...</div>
    </div>

    <script>
        const socket = io();
        const pathParts = window.location.pathname.split('/');
        const pubId = pathParts[pathParts.indexOf('pub') + 1];

        let qrKravJustNu = false;
        let qrObjekt = null; // Sparar QR-instansen så vi slipper återskapa den hela tiden

        socket.emit("join_pub", pubId);

        function bytFlik(flikNamn) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            if(flikNamn === 'sok') {
                document.getElementById('tab-sok').classList.add('active');
                document.getElementById('btn-tab-sok').classList.add('active');
            } else if(flikNamn === 'qr') {
                document.getElementById('tab-qr').classList.add('active');
                document.getElementById('btn-tab-qr').classList.add('active');
                genereraQRIFlik();
            }
        }

        // UPPDATERAD: Genererar koden HELT lokalt utan Google Charts API
        function genereraQRIFlik() {
            const nuvarandeUrl = window.location.href;
            document.getElementById("qr-lank-text").innerText = nuvarandeUrl;
            
            // Om vi inte har ritat koden än, gör det nu
            if (!qrObjekt) {
                document.getElementById("qr-kod-plats").innerHTML = ""; // Rensa texten "Laddar"
                qrObjekt = new QRCode(document.getElementById("qr-kod-plats"), {
                    text: nuvarandeUrl,
                    width: 180,
                    height: 180,
                    colorDark : "#000000",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });
            } else {
                // Om URL:en mot förmodan ändrats uppdaterar vi bara texten i den befintliga koden
                qrObjekt.clear();
                qrObjekt.makeCode(nuvarandeUrl);
            }
        }

        function delaTillPolarna() {
            if (navigator.share) {
                navigator.share({
                    title: 'Styr musiken i baren!',
                    text: 'Häng med och önska låtar direkt från mobilen här:',
                    url: window.location.href
                }).catch(err => console.log("Delning avbruten"));
            } else {
                alert("Kopiera och skicka denna länk: " + window.location.href);
            }
        }

        function sök() {
            const query = document.getElementById("query").value.trim();
            if(!query) return;
            document.getElementById("results").innerHTML = "<p style='opacity:0.5; font-size:14px;'>Söker på YouTube...</p>";
            socket.emit("search", { query: query });
        }

        function önskaLåt(videoId, title) {
            const kod = document.getElementById("kupong-input").value.trim();
            
            if(qrKravJustNu && !kod) {
                alert("Du måste skriva in koden från din papperslapp först!");
                return;
            }
            
            socket.emit("addSong", { 
                videoId: videoId, 
                title: title,
                kupongKod: kod 
            });
        }

        socket.on("kupong_error", (data) => {
            alert("❌ NEKAD: " + data.msg);
        });

        socket.on("kupong_success", (data) => {
            alert("✅ " + data.msg);
            document.getElementById("results").innerHTML = "";
            document.getElementById("query").value = "";
        });

        socket.on("searchResults", (data) => {
            const box = document.getElementById("results");
            if(!data.results || data.results.length === 0) {
                box.innerHTML = "<p style='opacity:0.3;'>Inga låtar hittades.</p>";
                return;
            }
            
            box.innerHTML = `
                <div class="item-box" style="margin-top:10px;">
                    <h3 style="margin-top:0; font-size:14px; color:#1db954;">SÖKRESULTAT:</h3>
                    ${data.results.map(item => {
                        const renTitel = item.title.replace(/'/g, "").replace(/"/g, "");
                        return `
                            <div class="row">
                                <img src="${item.thumbnail}">
                                <div style="flex:1; font-size:13px; font-weight:500; max-height:40px; overflow:hidden; line-height:1.2;">
                                    ${item.title}
                                </div>
                                <button class="add-btn" onclick="önskaLåt('${item.videoId}', '${renTitel}')">ÖNSKA</button>
                            </div>
                        `;
                    }).join("")}
                </div>
            `;
        });

        socket.on("state", (data) => {
            document.getElementById("pub-titel").innerHTML = `${data.pubNamn}`;
            
            qrKravJustNu = data.qrKrav;
            const kupongSektion = document.getElementById("kupong-sektion");
            if (data.qrKrav) {
                kupongSektion.style.display = "block";
            } else {
                kupongSektion.style.display = "none";
            }

            if(data.nowPlaying) {
                document.getElementById("now-playing-text").innerText = "🎵 " + data.nowPlaying.title;
            } else {
                document.getElementById("now-playing-text").innerText = "Tyst i baren... Önska en låt! 🤐";
            }

            const queueBox = document.getElementById("queue-lista");
            if (!data.queue || data.queue.length === 0) {
                queueBox.innerHTML = "<span style='opacity:0.3; font-size:13px;'>Kön är tom. Blir du först?</span>";
            } else {
                queueBox.innerHTML = data.queue.map((lat, index) => `
                    <div class="row" style="font-size:13px; justify-content:space-between;">
                        <span style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; padding-right:10px;">
                            <strong>${index + 1}.</strong> ${lat.title}
                        </span>
                        <small style="opacity:0.4; font-size:11px;">${lat.addedBy}</small>
                    </div>
                `).join("");
            }
        });
    </script>
</body>
</html>
