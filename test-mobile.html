<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jukebox</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: #0b0b0b; color: white; font-family: system-ui, sans-serif; padding: 20px; margin: 0; }
        h1 { font-size: 26px; margin-bottom: 5px; color: #fff; font-weight: 800; }
        .accent { color: #1db954; }
        .info-bar { background: #1a1a1e; padding: 10px; border-radius: 8px; font-size: 13px; margin-bottom: 20px; color: #aaa; border: 1px solid #222; }
        .search-box { display: flex; gap: 8px; margin-bottom: 20px; }
        input[type="text"] { flex: 1; padding: 12px; border-radius: 8px; border: 2px solid #333; background: #1a1a1a; color: white; font-size: 16px; outline: none; }
        input[type="text"]:focus { border-color: #1db954; }
        button { padding: 12px 20px; background: #1db954; color: black; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
        .item { display: flex; gap: 12px; background: #1a1a1e; padding: 10px; border-radius: 8px; margin-bottom: 8px; align-items: center; cursor: pointer; text-align: left; }
        .thumb { width: 70px; height: 40px; object-fit: cover; border-radius: 4px; }
        .title { font-size: 14px; flex: 1; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .plus-btn { color: #1db954; font-weight: bold; font-size: 22px; }
        .queue-container { background: #111; padding: 15px; border-radius: 12px; margin-top: 30px; border: 1px solid #222; text-align: left; }
        .playing-title { font-weight: bold; margin-bottom: 15px; color: #ffcc00; }
    </style>
</head>
<body>

    <h1 id="pub-titel">Laddar <span class="accent">Jukebox...</span></h1>
    <div class="info-bar" id="pub-info">Hämtar prisuppgifter...</div>
    
    <div class="search-box">
        <input type="text" id="query" placeholder="Sök artist eller låt...">
        <button onclick="sök()">SÖK</button>
    </div>

    <div id="results"></div>

    <div class="queue-container">
        <h3 style="margin-top: 0; color: #1db954; font-size: 16px;">Nu spelas:</h3>
        <div id="now-playing" class="playing-title">Inget just nu...</div>
        
        <h3 style="color: #888; font-size: 14px; margin-bottom: 10px;">Kommande låtar:</h3>
        <div id="queue-list">Kön är tom.</div>
    </div>

    <script>
        const socket = io();
        
        // Räkna ut pubId baserat på sökbanan (plockar ut '7-an' från t.ex. /pub/7-an/mobile)
        const pathParts = window.location.pathname.split('/');
        const pubId = pathParts[pathParts.indexOf('pub') + 1];

        // Anslut till rätt rum på servern direkt
        socket.emit("join_pub", pubId);

        function sök() {
            const txt = document.getElementById("query").value.trim();
            if(!txt) return;
            document.getElementById("results").innerHTML = "<div style='opacity:0.5; padding:10px; text-align:center;'>Söker på YouTube...</div>";
            socket.emit("search", { query: txt });
        }

        document.getElementById("query").addEventListener("keypress", function(e) {
            if (e.key === "Enter") sök();
        });

        function väljLåt(item) {
            socket.emit("addSong", { videoId: item.videoId, title: item.title });
            document.getElementById("results").innerHTML = "";
            document.getElementById("query").value = "";
            alert("Låten har lagts till i kön!");
        }

        socket.on("searchResults", (data) => {
            const div = document.getElementById("results");
            if (!data.results || data.results.length === 0) {
                div.innerHTML = "<div style='opacity:0.5; padding:10px; text-align:center;'>Inga träffar.</div>";
                return;
            }
            div.innerHTML = data.results.map(item => `
                <div class="item" onclick='väljLåt(${JSON.stringify(item).replace(/'/g, "&apos;")})'>
                    <img class="thumb" src="${item.thumbnail}">
                    <div class="title">${item.title}</div>
                    <div class="plus-btn">+</div>
                </div>
            `).join("");
        });

        socket.on("state", (data) => {
            // Uppdatera pub-specifik text på skärmen
            document.getElementById("pub-titel").innerHTML = `${data.pubNamn} <span class="accent">Jukebox</span> 🎵`;
            document.getElementById("pub-info").innerText = `Pris per önskning: ${data.pris} kr | Swish: ${data.swish}`;
            
            document.getElementById("now-playing").innerText = data.nowPlaying ? data.nowPlaying.title : "Inget just nu...";
            
            const qList = document.getElementById("queue-list");
            if (!data.queue || data.queue.length === 0) {
                qList.innerHTML = "<span style='opacity:0.3;'>Kön är tom.</span>";
            } else {
                qList.innerHTML = data.queue.map((lat, index) => `
                    <div style="padding: 10px 0; border-bottom: 1px solid #222; font-size: 14px; display: flex; gap: 8px;">
                        <span style="color: #1db954; font-weight:bold;">${index + 1}.</span> 
                        <span style="flex:1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${lat.title} <small style='opacity:0.4;'>(${lat.addedBy})</small></span>
                    </div>
                `).join("");
            }
        });
    </script>
</body>
</html>
