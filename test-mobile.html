<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Önska Låt - Jukebox</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: #0b0b0b; color: white; font-family: system-ui, sans-serif; padding: 15px; margin: 0; }
        h1 { font-size: 24px; text-align: center; margin-bottom: 5px; }
        .accent { color: #1db954; }
        
        /* Delningsknapp */
        .share-btn { display: block; width: 100%; padding: 12px; background: #007aff; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 14px; cursor: pointer; text-align: center; margin-bottom: 15px; }

        /* Kupongsektion */
        .kupong-box { background: #1a1a1e; border: 1px solid #333; padding: 12px; border-radius: 8px; margin-bottom: 15px; }
        .kupong-box label { font-size: 13px; color: #aaa; display: block; margin-bottom: 5px; }
        .kupong-box input { width: 100%; padding: 10px; background: #111; border: 1px solid #444; color: white; border-radius: 6px; font-size: 15px; box-sizing: border-box; font-weight: bold; text-transform: uppercase; }

        /* Söksektion */
        .search-box { display: flex; gap: 8px; margin-bottom: 20px; }
        .search-box input { flex: 1; padding: 12px; background: #111; border: 1px solid #222; color: white; border-radius: 8px; font-size: 16px; }
        .search-box button { background: #1db954; color: black; border: none; padding: 0 16px; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; }

        /* Listor */
        .item-box { background: #111; border: 1px solid #222; border-radius: 8px; padding: 12px; margin-bottom: 15px; }
        .row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #222; }
        .row:last-child { border-bottom: none; }
        .row img { width: 50px; height: 50px; border-radius: 4px; object-fit: cover; }
        
        .add-btn { background: #1db954; color: black; border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; font-size: 13px; cursor: pointer; margin-left: auto; }
        #now-playing-text { color: #ffcc00; font-weight: bold; font-size: 15px; }
    </style>
</head>
<body>

    <h1 id="pub-titel">Laddar <span class="accent">Jukebox...</span></h1>
    
    <button class="share-btn" onclick="delaTillPolarna()">DELA LÄNK MED BORDET 🚀</button>

    <div class="kupong-box">
        <label for="kupong-input">SKRIV IN KOD FRÅN PAPPPERSLAPPEN:</label>
        <input type="text" id="kupong-input" placeholder="T.EX. 1024-A4B2C8">
    </div>

    <div class="item-box" style="border-color: #ffcc00; text-align: center;">
        <small style="color:#888;">JUST NU I HÖGTALARNA:</small>
        <div id="now-playing-text">Hämtar status...</div>
    </div>

    <div class="search-box">
        <input type="text" id="query" placeholder="Sök låt eller artist...">
        <button onclick="sök()">SÖK</button>
    </div>

    <div id="results" class="tab-content" style="margin-bottom:20px;"></div>

    <div class="item-box">
        <h3 style="margin-top:0; font-size:14px; color:#888;">KOMMANDE LÅTAR:</h3>
        <div id="queue-lista">Laddar kö...</div>
    </div>

    <script>
        const socket = io();

        const pathParts = window.location.pathname.split('/');
        const pubId = pathParts[pathParts.indexOf('pub') + 1];

        socket.emit("join_pub", pubId);

        // VIRAL DELNINGSFUNKTION (Använder mobilens inbyggda meny)
        function delaTillPolarna() {
            if (navigator.share) {
                navigator.share({
                    title: 'Styr musiken i baren!',
                    text: 'Häng med och önska låtar direkt från mobilen här:',
                    url: window.location.href // Skickar med exakt länken de är på
                }).catch(err => console.log("Delning avbruten"));
            } else {
                // Fallback om webbläsaren saknar stöd
                alert("Kopiera och skicka denna länk: " + window.location.href);
            }
        }

        function sök() {
            const query = document.getElementById("query").value.trim();
            if(!query) return;
            document.getElementById("results").innerHTML = "<p style='opacity:0.5; font-size:14px;'>Söker på YouTube...</p>";
            socket.emit("search", { query: query });
        }

        function önskaLåt(videoId, title) {
            const kod = document.getElementById("kupong-input").value.trim();
            if(!kod) {
                alert("Du måste skriva in koden från din papperslapp först!");
                return;
            }
            
            socket.emit("addSong", { 
                videoId: videoId, 
                title: title,
                kupongKod: kod 
            });
        }

        // Felhantering för kuponger
        socket.on("kupong_error", (data) => {
            alert("❌ NEKAD: " + data.msg);
        });

        // Framgång för kuponger
        socket.on("kupong_success", (data) => {
            alert("✅ " + data.msg);
            document.getElementById("results").innerHTML = ""; // Rensa sökresultaten efter önskning
            document.getElementById("query").value = "";
        });

        socket.on("searchResults", (data) => {
            const box = document.getElementById("results");
            if(!data.results || data.results.length === 0) {
                box.innerHTML = "<p style='opacity:0.3;'>Inga låtar hittades.</p>";
                return;
            }
            
            box.innerHTML = `
                <div class="item-box">
                    <h3 style="margin-top:0; font-size:14px; color:#1db954;">SÖKRESULTAT:</h3>
                    ${data.results.map(item => {
                        const renTitel = item.title.replace(/'/g, "").replace(/"/g, "");
                        return `
                            <div class="row">
                                <img src="${item.thumbnail}">
                                <div style="flex:1; font-size:13px; font-weight:500; max-height:40px; overflow:hidden; line-height:1.2;">
                                    ${item.title}
                                </div>
                                <button class="add-btn" onclick="önskaLåt('${item.videoId}', '${renTitel}')">ÖNSKA</button>
                            </div>
                        `;
                    }).join("")}
                </div>
            `;
        });

        socket.on("state", (data) => {
            document.getElementById("pub-titel").innerHTML = `${data.pubNamn}`;
            
            if(data.nowPlaying) {
                document.getElementById("now-playing-text").innerText = "🎵 " + data.nowPlaying.title;
            } else {
                document.getElementById("now-playing-text").innerText = "Tyst i baren... Önska en låt! 🤐";
            }

            const queueBox = document.getElementById("queue-lista");
            if (!data.queue || data.queue.length === 0) {
                queueBox.innerHTML = "<span style='opacity:0.3; font-size:13px;'>Kön är tom. Blir du först?</span>";
            } else {
                queueBox.innerHTML = data.queue.map((lat, index) => `
                    <div class="row" style="font-size:13px; justify-content:space-between;">
                        <span style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; padding-right:10px;">
                            <strong>${index + 1}.</strong> ${lat.title}
                        </span>
                        <small style="opacity:0.4; font-size:11px;">${lat.addedBy}</small>
                    </div>
                `).join("");
            }
        });
    </script>
</body>
</html>
