<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jukebox - Mobil</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background: #0b0b0b; color: white; font-family: system-ui, sans-serif; padding: 15px; margin: 0; }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .tabs-nav { display: flex; gap: 5px; margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 8px; }
        .tab-btn { flex: 1; padding: 12px; background: #1a1a1e; color: #888; border: 1px solid #333; border-radius: 6px; font-weight: bold; }
        .tab-btn.active { background: #1db954; color: black; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .status-badge { padding: 12px; border-radius: 8px; margin-bottom: 15px; text-align: center; font-weight: bold; font-size: 14px; border: 1px solid; }
        .kupong-box { background: #1a1a1e; border: 1px solid #333; padding: 12px; border-radius: 8px; margin-bottom: 15px; }
        .kupong-box input { width: 100%; padding: 10px; background: #111; border: 1px solid #444; color: white; border-radius: 6px; font-weight: bold; text-transform: uppercase; box-sizing: border-box; }
        .search-box { display: flex; gap: 8px; margin-bottom: 15px; }
        .search-box input { flex: 1; padding: 12px; background: #111; border: 1px solid #222; color: white; border-radius: 8px; font-size: 16px; }
        .search-box button { background: #1db954; color: black; border: none; padding: 0 16px; border-radius: 8px; font-weight: bold; }
        .item-box { background: #111; border: 1px solid #222; border-radius: 8px; padding: 12px; margin-bottom: 15px; }
        
        /* MOBILANPASSAT: Kompakt bildvisning och layout */
        .row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #222; }
        .row img { width: 60px; height: 45px; object-fit: cover; border-radius: 4px; flex-shrink: 0; }
        .row span { flex: 1; font-size: 13px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.3; }
        
        .add-btn { background: #1db954; color: black; border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; flex-shrink: 0; }
    </style>
</head>
<body>

    <div class="header-row">
        <h1 id="pub-titel" style="font-size:20px; margin:0;">Laddar...</h1>
        <button style="background:#222; color:#aaa; border:1px solid #444; padding:6px 12px; border-radius:6px;" onclick="window.location.reload()">🔄</button>
    </div>
    
    <div id="biljett-status-banner" class="status-badge" style="display: none;"></div>

    <div class="tabs-nav">
        <button id="btn-tab-sok" class="tab-btn active" onclick="bytFlik('sok')">🎵 Jukebox</button>
        <button id="btn-tab-qr" class="tab-btn" onclick="bytFlik('qr')">⚙️ Biljett & Meny</button>
    </div>

    <div id="tab-sok" class="tab-content active">
        <div class="item-box" style="border-color: #ffcc00; text-align: center;">
            <small style="color:#888;">JUST NU I HÖGTALARNA:</small>
            <div id="now-playing-text" style="color:#ffcc00; font-weight:bold; margin-top:5px;">Hämtar...</div>
        </div>

        <div class="search-box" style="margin-top:15px;">
            <input type="text" id="query" placeholder="Sök låt eller artist...">
            <button onclick="sök()">SÖK</button>
        </div>
        <div id="results"></div>

        <div class="item-box">
            <h3 style="margin:0 0 10px 0; font-size:14px; color:#888;">NÄSTA LÅTAR:</h3>
            <div id="queue-lista"></div>
        </div>
    </div>

    <div id="tab-qr" class="tab-content">
        <div class="kupong-box">
            <label style="font-size:13px; color:#aaa; display:block; margin-bottom:5px;">Aktiv Biljettkod:</label>
            <input type="text" id="kupong-input" placeholder="INGEN BILJETT LADDAD" oninput="uppdateraBanner()">
        </div>

        <button style="display:block; width:100%; padding:12px; background:#007aff; color:white; border:none; border-radius:8px; font-weight:bold;" onclick="delaLank()">Dela länk 🚀</button>
    </div>

    <script>
        const socket = io();
        
        // Hittar baren säkert utifrån URL:en /pub/ID/mobile
        const pathParts = window.location.pathname.split('/');
        const pubId = pathParts[pathParts.indexOf('pub') + 1];
        
        let qrKravJustNu = false;

        socket.emit("join_pub", pubId);

        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            if(params.get('kod')) document.getElementById("kupong-input").value = params.get('kod').trim().toUpperCase();
            uppdateraBanner();
        });

        function uppdateraBanner() {
            const kod = document.getElementById("kupong-input").value.trim();
            const banner = document.getElementById("biljett-status-banner");
            
            if (qrKravJustNu) {
                if(kod.length > 0) {
                    const delar = kod.split("-");
                    const maxLatar = delar[1] ? delar[1] : "1";
                    banner.style.display = "block";
                    banner.innerText = `🎫 BILJETT LADDAD: Gäller för max ${maxLatar} låtar!`;
                    banner.style.background = "#1a3a22"; banner.style.color = "#1db954"; banner.style.borderColor = "#1db954";
                } else {
                    banner.style.display = "block";
                    banner.innerText = "🔒 KOSTNAD: Skanna en QR-kod/biljett för att önska.";
                    banner.style.background = "#3a1a1a"; banner.style.color = "#e91429"; banner.style.borderColor = "#e91429";
                }
            } else {
                banner.style.display = "none";
            }
        }

        function bytFlik(f) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-'+f).classList.add('active');
            document.getElementById('btn-tab-'+f).classList.add('active');
        }

        function sök() {
            const q = document.getElementById("query").value.trim();
            if(q) socket.emit("search", { query: q });
        }

        function önskaLåt(vId, t) {
            // Skickar explicit med pubId i objektet så att servern inte kan missa det
            socket.emit("addSong", { 
                pubId: pubId,
                videoId: vId, 
                title: t, 
                kupongKod: document.getElementById("kupong-input").value.trim() 
            });
        }

        socket.on("kupong_error", (d) => alert(d.msg));
        socket.on("kupong_success", (d) => {
            alert(d.msg);
            if(d.resterande <= 0) {
                document.getElementById("kupong-input").value = "";
                window.history.replaceState({}, document.title, window.location.pathname);
            }
            document.getElementById("results").innerHTML = "";
            document.getElementById("query").value = "";
            uppdateraBanner();
        });

        socket.on("searchResults", (d) => {
            document.getElementById("results").innerHTML = `<div class="item-box">${d.results.map(i => `
                <div class="row">
                    <img src="${i.thumbnail}">
                    <span>${i.title}</span>
                    <button class="add-btn" onclick="önskaLåt('${i.videoId}', '${i.title.replace(/'/g, "").replace(/"/g, "")}')">ÖNSKA</button>
                </div>
            `).join("")}</div>`;
        });

        socket.on("state", (data) => {
            document.getElementById("pub-titel").innerText = data.pubNamn;
            qrKravJustNu = data.qrKrav;
            uppdateraBanner();
            document.getElementById("now-playing-text").innerText = data.nowPlaying ? "🎵 " + data.nowPlaying.title : "Tyst i baren...";
            document.getElementById("queue-lista").innerHTML = data.fullQueue.length === 0 ? "<span style='opacity:0.3; font-size:13px;'>Kön är tom.</span>" : data.fullQueue.map((l, i) => `
                <div class="row" style="justify-content:space-between; font-size:13px;"><span><strong>${i+1}.</strong> ${l.title}</span></div>
            `).join("");
        });

        function delaLank() { navigator.share({ url: window.location.origin + window.location.pathname }); }
    </script>
</body>
</html>
