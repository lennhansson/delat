<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="utf-8">
    <title>Utskrift - Jukebox Globalbiljetter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    <style>
        body { font-family: sans-serif; background: #f0f0f0; margin: 0; padding: 20px; color: #333; }
        .kontroller { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .kontroller label { font-weight: bold; display: block; margin-bottom: 5px; }
        .kontroller input { padding: 10px; font-size: 16px; width: 300px; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 15px; }
        .kontroller button { padding: 10px 20px; font-size: 16px; background: #1db954; color: black; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        
        .ark { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; max-width: 210mm; margin: 0 auto; }
        .kupong { background: white; border: 2px dashed #000; padding: 15px; text-align: center; border-radius: 8px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; justify-content: space-between; height: 75mm; }
        .kupong h2 { margin: 0 0 5px 0; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; color: #1db954; }
        .kupong p { margin: 0 0 10px 0; font-size: 11px; color: #666; font-weight: bold; }
        .qr-kod { background: white; padding: 5px; display: inline-block; }
        .kod-text { font-family: monospace; font-size: 18px; font-weight: bold; background: #eee; padding: 5px 10px; border-radius: 4px; margin-top: 10px; letter-spacing: 1px; width: 90%; }
        
        @media print {
            body { background: white; padding: 0; }
            .kontroller { display: none; }
            .ark { gap: 10mm; }
            .kupong { page-break-inside: avoid; border-color: #666; }
        }
    </style>
</head>
<body>

    <div class="kontroller">
        <h2>Generera Globala Biljetter</h2>
        <p style="margin: 0 0 15px 0; color: #666; font-size: 14px;">
            Skapa biljetter som fungerar på alla pubar via MASTER_SECRET.
        </p>
        <label for="secret-input">MASTER_SECRET:</label>
        <input type="text" id="secret-input" value="din-hemliga-globala-paniknyckel-2026">
        <br>
        <button onclick="genereraArk()">Skapa 12 Nya Kuponger 🖨️</button>
    </div>

    <div class="ark" id="ark-container"></div>

    <script>
        function genereraArk() {
            const masterSecret = document.getElementById("secret-input").value.trim();
            const container = document.getElementById("ark-container");
            container.innerHTML = "";

            for (let i = 0; i < 12; i++) {
                const kupongId = Math.floor(1000 + Math.random() * 9000).toString();
                const hash = CryptoJS.HmacSHA256(kupongId, masterSecret);
                const hashInHex = CryptoJS.enc.Hex.stringify(hash);
                const signatur = hashInHex.substring(0, 6);
                const fullständigKod = `${kupongId}-${signatur}`.toUpperCase();

                const kupongDiv = document.createElement("div");
                kupongDiv.className = "kupong";
                kupongDiv.innerHTML = `
                    <div>
                        <h2>Global Jukebox</h2>
                        <p>Gäller för 1 valfri önskelåt</p>
                    </div>
                    <div class="qr-kod" id="qr-${kupongId}"></div>
                    <div class="kod-text">${fullständigKod}</div>
                `;
                container.appendChild(kupongDiv);

                new QRCode(document.getElementById(`qr-${kupongId}`), {
                    text: fullständigKod,
                    width: 100,
                    height: 100,
                    colorDark : "#000000",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.M
                });
            }
        }
        genereraArk();
    </script>
</body>
</html>
