<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jukebox Spelare</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: #0b0b0b; color: white; font-family: system-ui, sans-serif; padding: 15px; margin: 0; }
        h1 { font-size: 22px; text-align: center; margin-bottom: 15px; }
        .accent { color: #1db954; }
        
        /* Flik-knappar */
        .tabs { display: flex; background: #1a1a1e; border-radius: 8px; padding: 4px; margin-bottom: 20px; border: 1px solid #222; }
        .tab-btn { flex: 1; padding: 12px; background: transparent; color: #888; border: none; font-weight: bold; font-size: 14px; border-radius: 6px; cursor: pointer; text-align: center; }
        .tab-btn.active { background: #1db954; color: black; }
        
        /* Flikinnehåll */
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Spelarkontroller */
        #start-btn { display: block; width: 100%; padding: 20px; font-size: 18px; background: #1db954; color: black; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 15px; }
        #skip-btn { display: block; width: 100%; padding: 15px; font-size: 16px; background: #ff4444; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        #status { font-size: 16px; color: #ffcc00; text-align: center; font-weight: bold; margin: 15px 0; }
        #player-div { width: 100%; height: 200px; background: #000; border-radius: 8px; overflow: hidden; }

        /* Listor och radering */
        .item-box { background: #111; border: 1px solid #222; border-radius: 8px; padding: 15px; }
        .row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #222; font-size: 14px; }
        .del-btn { background: #ff4444; color: white; border: none; padding: 6px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 12px; }

        /* Valv/Spellistor-stil */
        .valv-card { background: #1a1a1e; border: 2px solid #222; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .valv-card.active { border-color: #1db954; background: #112215; }
        .act-btn { background: #1db954; color: black; border: none; padding: 8px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .valv-card.active .act-btn { background: #333; color: #777; cursor: not-allowed; }
    </style>
</head>
<body>

    <h1 id="player-titel">Laddar <span class="accent">Spelare...</span></h1>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="bytFlik('flik-spelare', this)">SPELARE</button>
        <button class="tab-btn" onclick="bytFlik('flik-ko', this)">HANTERA KÖ</button>
        <button class="tab-btn" onclick="bytFlik('flik-valv', this)">SPELLISTOR (VALV)</button>
    </div>

    <div id="flik-spelare" class="tab-content active">
        <button id="start-btn" onclick="starta()">STARTA BARMUSIKEN 🔊</button>
        <div id="player-div"></div>
        <p id="status">Klicka på knappen ovan för att kicka igång ljudet i baren.</p>
        <button id="skip-btn" onclick="skipLat()" style="display:none;">SKIPPA LÅT ⏭️</button>
    </div>

    <div id="flik-ko" class="tab-content">
        <div class="item-box">
            <h3 style="margin-top:0; color:#888; font-size:14px;">AKTUELL KÖ JUST NU:</h3>
            <div id="bar-queue-styrt">Laddar kö...</div>
        </div>
    </div>

    <div id="flik-valv" class="tab-content">
        <div id="valv-lista-container">Hämtar tillgängliga valv...</div>
    </div>

    <script>
        const socket = io(); 
        let player;

        const pathParts = window.location.pathname.split('/');
        const pubId = pathParts[pathParts.indexOf('pub') + 1];

        socket.emit("join_pub", pubId);

        function bytFlik(flikId, btn) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(flikId).classList.add('active');
            btn.classList.add('active');
        }

        function starta() {
            document.getElementById("start-btn").style.display = "none";
            document.getElementById("skip-btn").style.display = "block";
            document.getElementById("status").innerText = "Laddar YouTube-motor...";
            
            const tag = document.createElement('script');
            tag.src = "https://www.youtube.com/iframe_api";
            document.getElementsByTagName('head')[0].appendChild(tag);
        }

        function skipLat() {
            if(confirm("Vill du skippa denna låt?")) {
                socket.emit("player:skip");
            }
        }

        function raderaLat(id) {
            if(confirm("Vill du ta bort den här låten ur kön?")) {
                socket.emit("player:remove_song", { id: id });
            }
        }

        function aktiveraValv(valvNamn) {
            socket.emit("player:byt_valv", { valvNamn: valvNamn });
        }

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player-div', {
                height: '100%',
                width: '100%',
                videoId: '', 
                playerVars: { 'autoplay': 1, 'controls': 1, 'disablekb': 1 },
                events: { 
                    'onStateChange': (e) => {
                        if (e.data === YT.PlayerState.ENDED) {
                            socket.emit("player:ready_for_next");
                        }
                    },
                    'onReady': () => {
                        socket.emit("player:ready_for_next");
                    }
                }
            });
        }

        socket.on("player:change_track", (data) => {
            if (player && player.loadVideoById) {
                player.loadVideoById(data.videoId);
            }
        });

        socket.on("state", (data) => {
            document.getElementById("player-titel").innerHTML = `${data.pubNamn} <span class="accent">Management</span>`;
            
            // Uppdatera statusfliken
            if(data.nowPlaying) {
                document.getElementById("status").innerText = "Spelar nu: " + data.nowPlaying.title;
            } else {
                document.getElementById("status").innerText = "Väntar på musik eller val... 👀";
            }

            // Uppdatera Hantera Kö-fliken (med raderingsknappar)
            const queueBox = document.getElementById("bar-queue-styrt");
            if (!data.fullQueue || data.fullQueue.length === 0) {
                queueBox.innerHTML = "<span style='opacity:0.3; font-size:14px;'>Inga låtar i kön just nu.</span>";
            } else {
                queueBox.innerHTML = data.fullQueue.map((lat, index) => `
                    <div class="row">
                        <div style="flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding-right:10px;">
                            <strong>${index + 1}.</strong> ${lat.title} <br>
                            <small style="opacity:0.4;">Inlagd av: ${lat.addedBy}</small>
                        </div>
                        <button class="del-btn" onclick="raderaLat('${lat.id}')">TA BORT</button>
                    </div>
                `).join("");
            }

            // Uppdatera Spellistor/Valv-fliken
            const valvBox = document.getElementById("valv-lista-container");
            if (data.valvLista && data.valvLista.length > 0) {
                valvBox.innerHTML = data.valvLista.map(valvNamn => {
                    const isActive = valvNamn === data.aktivtValv;
                    return `
                        <div class="valv-card ${isActive ? 'active' : ''}">
                            <div>
                                <strong style="font-size:15px;">${valvNamn}</strong><br>
                                <small style="opacity:0.5;">${isActive ? 'Igång som bakgrundsmusik' : 'Klicka för att aktivera'}</small>
                            </div>
                            <button class="act-btn" ${isActive ? 'disabled' : ''} onclick="aktiveraValv('${valvNamn}')">
                                ${isActive ? 'AKTIV' : 'VÄLJ'}
                            </button>
                        </div>
                    `;
                }).join("");
            } else {
                valvBox.innerHTML = "Inga valv hittades.";
            }
        });
    </script>
</body>
</html>
