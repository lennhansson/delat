<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jukebox Spelare</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: #0b0b0b; color: white; font-family: system-ui, sans-serif; padding: 12px; margin: 0; box-sizing: border-box; }
        h1 { font-size: 20px; text-align: center; margin: 10px 0; }
        .accent { color: #1db954; }
        
        /* Videofönster och fast kontroll */
        .player-wrapper { background: #000; padding: 5px; border-radius: 8px; margin-bottom: 10px; }
        #player-div { width: 100%; height: 180px; background: #111; border-radius: 6px; }
        #status { font-size: 14px; color: #ffcc00; text-align: center; font-weight: bold; margin: 8px 0; }
        
        #skip-btn { display: block; width: 100%; padding: 14px; font-size: 16px; background: #ff4444; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 15px; }

        /* Flikknappar */
        .tabs { display: flex; background: #1a1a1e; border-radius: 8px; padding: 4px; margin-bottom: 15px; border: 1px solid #222; }
        .tab-btn { flex: 1; padding: 10px 5px; background: transparent; color: #888; border: none; font-weight: bold; font-size: 13px; border-radius: 6px; cursor: pointer; text-align: center; }
        .tab-btn.active { background: #1db954; color: black; }
        
        /* Flikinnehåll */
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Listor */
        .item-box { background: #111; border: 1px solid #222; border-radius: 8px; padding: 10px; }
        .row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #222; font-size: 13px; }
        .del-btn { background: #ff4444; color: white; border: none; padding: 6px 10px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 11px; }

        /* Spellistor-stil */
        .valv-card { background: #1a1a1e; border: 2px solid #222; padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .valv-card.active { border-color: #1db954; background: #112215; }
        .act-btn { background: #1db954; color: black; border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 13px; }
        .valv-card.active .act-btn { background: #333; color: #777; cursor: not-allowed; }
    </style>
</head>
<body>

    <h1 id="player-titel">Jukebox <span class="accent">Spelare</span></h1>
    
    <!-- Video och fasta kontroller som ALLTID syns i mobilen -->
    <div class="player-wrapper">
        <div id="player-div"></div>
    </div>
    <p id="status">Laddar spelarmotor...</p>
    <button id="skip-btn" onclick="skipLat()">SKIPPA LÅT ⏭️</button>

    <!-- Fliknavigering under spelaren -->
    <div class="tabs">
        <button class="tab-btn active" onclick="bytFlik('flik-ko', this)">HANTERA KÖ</button>
        <button class="tab-btn" onclick="bytFlik('flik-valv', this)">SPELLISTOR (VALV)</button>
    </div>

    <!-- FLIK 1: KÖHANTERING -->
    <div id="flik-ko" class="tab-content active">
        <div class="item-box">
            <div id="bar-queue-styrt">Hämtar kölista...</div>
        </div>
    </div>

    <!-- FLIK 2: SPELLISTOR -->
    <div id="flik-valv" class="tab-content">
        <div id="valv-lista-container">Hämtar tillgängliga valv...</div>
    </div>

    <script>
        const socket = io(); 
        let player;

        const pathParts = window.location.pathname.split('/');
        const pubId = pathParts[pathParts.indexOf('pub') + 1];

        // Anslut och starta YouTube API direkt utan knapptryck
        socket.emit("join_pub", pubId);

        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.getElementsByTagName('head')[0].appendChild(tag);

        function bytFlik(flikId, btn) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(flikId).classList.add('active');
            btn.classList.add('active');
        }

        function skipLat() {
            socket.emit("player:skip");
        }

        function raderaLat(id) {
            socket.emit("player:remove_song", { id: id });
        }

        function aktiveraValv(valvNamn) {
            socket.emit("player:byt_valv", { valvNamn: valvNamn });
        }

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player-div', {
                height: '100%',
                width: '100%',
                videoId: '', 
                playerVars: { 'autoplay': 1, 'controls': 1, 'playsinline': 1 },
                events: { 
                    'onStateChange': (e) => {
                        if (e.data === YT.PlayerState.ENDED) {
                            socket.emit("player:ready_for_next");
                        }
                    },
                    'onReady': () => {
                        document.getElementById("status").innerText = "Spelare redo! Väntar på musik...";
                        socket.emit("player:ready_for_next");
                    }
                }
            });
        }

        socket.on("player:change_track", (data) => {
            if (player && player.loadVideoById) {
                player.loadVideoById(data.videoId);
            }
        });

        socket.on("state", (data) => {
            document.getElementById("player-titel").innerHTML = `${data.pubNamn} <span class="accent">Spelare</span>`;
            
            if(data.nowPlaying) {
                document.getElementById("status").innerText = "Spelar nu: " + data.nowPlaying.title;
            } else {
                document.getElementById("status").innerText = "Väntar på musik... 👀";
            }

            const queueBox = document.getElementById("bar-queue-styrt");
            if (!data.fullQueue || data.fullQueue.length === 0) {
                queueBox.innerHTML = "<span style='opacity:0.3;'>Inga låtar i kön just nu.</span>";
            } else {
                queueBox.innerHTML = data.fullQueue.map((lat, index) => `
                    <div class="row">
                        <div style="flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding-right:8px;">
                            <strong>${index + 1}.</strong> ${lat.title} <br>
                            <small style="opacity:0.4;">Källa: ${lat.addedBy}</small>
                        </div>
                        <button class="del-btn" onclick="raderaLat('${lat.id}')">TA BORT</button>
                    </div>
                `).join("");
            }

            const valvBox = document.getElementById("valv-lista-container");
            if (data.valvLista && data.valvLista.length > 0) {
                valvBox.innerHTML = data.valvLista.map(valvNamn => {
                    const isActive = valvNamn === data.aktivtValv;
                    return `
                        <div class="valv-card ${isActive ? 'active' : ''}">
                            <div>
                                <strong style="font-size:14px;">${valvNamn}</strong><br>
                                <small style="opacity:0.5;">${isActive ? 'Aktiv bakgrundsmusik' : 'Klicka för att välja'}</small>
                            </div>
                            <button class="act-btn" ${isActive ? 'disabled' : ''} onclick="aktiveraValv('${valvNamn}')">
                                ${isActive ? 'AKTIV' : 'VÄLJ'}
                            </button>
                        </div>
                    `;
                }).join("");
            } else {
                valvBox.innerHTML = "Inga valv hittades.";
            }
        });
    </script>
</body>
</html>
