<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="utf-8">
    <title>Jukebox Spelare - Admin</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: #050505; color: white; font-family: system-ui, sans-serif; display: flex; height: 100vh; margin: 0; overflow: hidden; }
        .main-player { flex: 3; display: flex; flex-direction: column; background: #000; justify-content: center; align-items: center; position: relative; border-right: 2px solid #111; }
        .sidebar { flex: 1.5; display: flex; flex-direction: column; background: #0d0d11; padding: 20px; box-sizing: border-box; }
        
        .tabs-nav { display: flex; gap: 5px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; background: #1a1a24; color: #888; border: 1px solid #333; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .tab-btn.active { background: #1db954; color: black; border-color: #1db954; }
        
        .tab-content { display: none; flex-direction: column; flex: 1; overflow-y: auto; }
        .tab-content.active { display: flex; }

        .song-row { display: flex; justify-content: space-between; align-items: center; background: #141419; border: 1px solid #222; padding: 12px; border-radius: 8px; margin-bottom: 10px; font-size: 14px; }
        .btn-danger { background: #e91429; color: white; border: none; padding: 6px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .btn-success { background: #1db954; color: black; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        
        input, select { width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: white; border-radius: 6px; box-sizing: border-box; font-size: 15px; margin-bottom: 15px; }
        label { font-size: 13px; color: #aaa; margin-bottom: 5px; display: block; font-weight: bold; }
        
        #video-cover { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; text-align: center; pointer-events: none; }
    </style>
</head>
<body>

    <!-- VÄNSTER: YOUTUBE-SPELAREN -->
    <div class="main-player">
        <div id="player"></div>
        <div id="video-cover">
            <div>
                <h1 id="screen-now-playing" style="font-size: 32px; color: #ffcc00; margin: 0 0 10px 0;">Tyst i baren...</h1>
                <p id="screen-added-by" style="font-size: 18px; color: #888; margin: 0;">Väntar på val</p>
            </div>
        </div>
    </div>

    <!-- HÖGER: ADMINPANEL & FLIKAR -->
    <div class="sidebar">
        <h2 id="pub-namn" style="margin: 0 0 15px 0; font-size: 20px; text-transform: uppercase; border-bottom: 1px solid #222; padding-bottom: 10px;">Laddar Jukebox...</h2>

        <div class="tabs-nav">
            <button id="btn-tab-ko" class="tab-btn active" onclick="bytFlik('ko')">🎵 Spellista & Kö</button>
            <button id="btn-tab-config" class="tab-btn" onclick="bytFlik('config')">⚙️ Inställningar & Listor</button>
        </div>

        <!-- FLIK 1: KÖN JUST NU -->
        <div id="tab-ko" class="tab-content active">
            <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:15px;">
                <h3 style="margin:0; font-size:16px; color:#888;">NÄSTA LÅTAR I KÖN:</h3>
                <button onclick="skipLat()" class="btn-danger" style="background:#ffcc00; color:black;">SKIP LÅT ⏭️</button>
            </div>
            <div id="queue-lista" style="flex:1;"></div>
        </div>

        <!-- FLIK 2: INSTÄLLNINGAR & EDITERA FILER -->
        <div id="tab-config" class="tab-content">
            
            <!-- PUBENS AKTIVA INSTÄLLNINGAR -->
            <div style="background:#141419; padding:15px; border-radius:8px; margin-bottom:20px; border:1px solid #222;">
                <label>Kräv QR-biljett från gästerna:</label>
                <select id="qr-toggle" onchange="ändraQrKrav()">
                    <option value="false">NEJ (Helt gratis att önska)</option>
                    <option value="true">JA (Kräv biljettkod)</option>
                </select>

                <label style="color: #ffcc00;">Aktivt bakgrundsvalv (Spelas i högtalarna nu):</label>
                <select id="valv-väljare" onchange="ändraValv()" style="border-color: #ffcc00;"></select>
            </div>

            <!-- EDITERA VALFRI FIL (OBEROENDE AV VAD SOM SPELAS) -->
            <div style="background:#1a1a24; padding:15px; border-radius:8px; border:1px solid #333; display:flex; flex-direction:column; flex:1; min-height:0;">
                <h3 style="margin:0 0 10px 0; font-size:15px; color:#1db954;">HANTERA FILER & LÅTLISTOR:</h3>
                
                <label>Välj vilken fil du vill redigera:</label>
                <select id="edit-valv-väljare" onchange="bytEditFil()"></select>
                
                <div style="display:flex; gap:5px; margin-bottom:10px;">
                    <input type="text" id="ny-valv-lat" placeholder="Artist - Låttitel..." style="margin:0;">
                    <button onclick="läggTillIVabv()" class="btn-success" style="padding:0 15px;">LÄGG TILL</button>
                </div>

                <div id="valv-låtar-lista" style="flex:1; overflow-y:auto; border:1px solid #222; padding:10px; border-radius:6px; background:#09090d;"></div>
            </div>

        </div>
    </div>

    <!-- YouTube Iframe SDK -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let ytPlayer;
        const socket = io();
        const pathParts = window.location.pathname.split('/');
        const pubId = pathParts[pathParts.indexOf('pub') + 1];

        let valdFilAttEditera = ""; 
        let sparadValvData = null;

        socket.emit("join_pub", pubId);

        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: '',
                playerVars: { 'autoplay': 1, 'controls': 0, 'rel': 0, 'modestbranding': 1 },
                events: {
                    'onReady': () => socket.emit("player:ready_for_next"),
                    'onStateChange': (e) => {
                        if (e.data === YT.PlayerState.ENDED) {
                            socket.emit("player:ready_for_next");
                        }
                    }
                }
            });
        }

        socket.on("player:change_track", (data) => {
            if (ytPlayer && ytPlayer.loadVideoById) {
                ytPlayer.loadVideoById(data.videoId);
            }
        });

        socket.on("state", (data) => {
            document.getElementById("pub-namn").innerText = data.pubNamn;
            document.getElementById("qr-toggle").value = data.qrKrav.toString();
            
            if(data.valvData) {
                sparadValvData = data.valvData;
            }

            // Hantera Nu Spelas
            if(data.nowPlaying) {
                document.getElementById("screen-now-playing").innerText = data.nowPlaying.title;
                document.getElementById("screen-added-by").innerText = "Önskad av: " + data.nowPlaying.addedBy;
            } else {
                document.getElementById("screen-now-playing").innerText = "Tyst i baren...";
                document.getElementById("screen-added-by").innerText = "Väntar på val";
            }

            // Hantera Kö-listan
            const koLista = document.getElementById("queue-lista");
            koLista.innerHTML = data.fullQueue.length === 0 ? "<p style='color:#555; font-size:14px;'>Kön är tom.</p>" : data.fullQueue.map(l => `
                <div class="song-row">
                    <span><strong>[${l.addedBy}]</strong> ${l.title}</span>
                    <button class="btn-danger" onclick="taBortUrKö('${l.id}')">❌</button>
                </div>
            `).join("");

            // 1. Uppdatera HÖGTALAR-DROPDOWN (Vad som spelas nu)
            const väljare = document.getElementById("valv-väljare");
            väljare.innerHTML = data.valvLista.map(v => `<option value="${v}" ${v === data.aktivtValv ? 'selected' : ''}>${v}</option>`).join("");

            // 2. Uppdatera EDITERINGS-DROPDOWN (Om det är första gången vi laddar)
            const editVäljare = document.getElementById("edit-valv-väljare");
            const gamlaValet = editVäljare.value;
            
            editVäljare.innerHTML = data.valvLista.map(v => `<option value="${v}">${v}</option>`).join("");
            
            if (gamlaValet && data.valvLista.includes(gamlaValet)) {
                editVäljare.value = gamlaValet;
            }
            
            if(!valdFilAttEditera || !data.valvLista.includes(valdFilAttEditera)) {
                valdFilAttEditera = editVäljare.value;
            }

            renderaValvEditering();
        });

        function renderaValvEditering() {
            const root = document.getElementById("valv-låtar-lista");
            if(!sparadValvData || !sparadValvData[valdFilAttEditera]) {
                root.innerHTML = "<p style='color:#555; padding:10px;'>Välj en fil ovan för att visa låtar.</p>";
                return;
            }
            
            root.innerHTML = sparadValvData[valdFilAttEditera].map(latText => `
                <div class="song-row" style="padding: 8px; margin-bottom: 5px; background:#111;">
                    <span style="font-size:13px;">${latText}</span>
                    <button class="btn-danger" style="padding:2px 8px; font-size:11px;" onclick="raderaUrValv('${latText}')">❌</button>
                </div>
            `).join("");
        }

        function bytEditFil() {
            valdFilAttEditera = document.getElementById("edit-valv-väljare").value;
            renderaValvEditering();
        }

        // Knappfunktioner
        function bytFlik(f) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-'+f).classList.add('active');
            document.getElementById('btn-tab-'+f).classList.add('active');
        }
        
        function skipLat() { socket.emit("player:skip"); }
        function taBortUrKö(id) { socket.emit("player:remove_song", { id: id }); }
        function ändraQrKrav() { socket.emit("player:toggle_qr", { qrKrav: document.getElementById("qr-toggle").value === "true" }); }
        function ändraValv() { socket.emit("player:byt_valv", { valvNamn: document.getElementById("valv-väljare").value }); }
        
        function läggTillIVabv() {
            const t = document.getElementById("ny-valv-lat").value.trim();
            if(t && valdFilAttEditera) {
                socket.emit("player:add_to_valv", { valvNamn: valdFilAttEditera, title: t });
                document.getElementById("ny-valv-lat").value = "";
            }
        }
        
        function raderaUrValv(texten) {
            if(confirm(`Vill du ta bort "${texten}" från listan ${valdFilAttEditera}?`)) {
                socket.emit("player:remove_from_valv", { valvNamn: valdFilAttEditera, title: texten });
            }
        }
    </script>
</body>
</html>
