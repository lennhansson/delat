<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="utf-8">
    <title>Jukebox Spelare</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: #000; color: white; font-family: system-ui, sans-serif; text-align: center; padding: 30px; margin: 0; }
        h1 { font-size: 28px; font-weight: 800; margin-bottom: 5px; }
        .accent { color: #1db954; }
        .controls { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        #start-btn { padding: 15px 30px; font-size: 18px; background: #1db954; color: black; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; }
        #skip-btn { padding: 12px 25px; font-size: 16px; background: #ff4444; color: white; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; display: none; }
        #status { font-size: 18px; color: #ffcc00; margin: 15px 0; font-weight: bold; }
        #player-div { margin: 20px auto; border-radius: 8px; overflow: hidden; max-width: 640px; }
        .playlist-box { max-width: 500px; margin: 30px auto; background: #111; border: 1px solid #222; border-radius: 12px; padding: 20px; text-align: left; }
        .playlist-title { color: #888; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; margin-top: 0; border-bottom: 1px solid #222; padding-bottom: 8px; }
        .queue-item { padding: 10px 0; border-bottom: 1px solid #1a1a1a; font-size: 15px; color: #ccc; display: flex; gap: 10px; }
    </style>
</head>
<body>

    <h1 id="player-titel">Jukebox <span class="accent">Spelare</span> 📻</h1>
    
    <div class="controls">
        <button id="start-btn" onclick="starta()">STARTA MUSIKEN</button>
        <button id="skip-btn" onclick="skipLat()">SKIP LÅT ⏭️</button>
    </div>
    
    <p id="status">Klicka på knappen för att starta ljudet på denna pub</p>

    <div id="player-div"></div>

    <div class="playlist-box">
        <div class="playlist-title">Kommande spellista:</div>
        <div id="bar-queue">Kön är tom.</div>
    </div>

    <script>
        const socket = io(); 
        let player;

        const pathParts = window.location.pathname.split('/');
        const pubId = pathParts[pathParts.indexOf('pub') + 1];

        socket.emit("join_pub", pubId);

        function starta() {
            document.getElementById("start-btn").style.display = "none";
            document.getElementById("skip-btn").style.display = "inline-block";
            document.getElementById("status").innerText = "Ansluter ljudström...";
            
            const tag = document.createElement('script');
            tag.src = "https://www.youtube.com/iframe_api";
            document.getElementsByTagName('head')[0].appendChild(tag);
        }

        function skipLat() {
            if(confirm("Vill du hoppa över låten på den här puben?")) {
                socket.emit("player:skip");
            }
        }

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player-div', {
                height: '240',
                width: '400',
                videoId: '', 
                playerVars: { 'autoplay': 1, 'controls': 1 },
                events: { 
                    'onStateChange': (e) => {
                        if (e.data === YT.PlayerState.ENDED) {
                            socket.emit("player:ready_for_next");
                        }
                    },
                    'onReady': () => {
                        socket.emit("player:ready_for_next");
                    }
                }
            });
        }

        socket.on("player:change_track", (data) => {
            if (player && player.loadVideoById) {
                player.loadVideoById(data.videoId);
            }
        });

        socket.on("state", (data) => {
            document.getElementById("player-titel").innerHTML = `${data.pubNamn} <span class="accent">Spelare</span>`;
            
            if(data.nowPlaying) {
                document.getElementById("status").innerText = "Spelar nu: " + data.nowPlaying.title;
            } else {
                document.getElementById("status").innerText = "Väntar på musik...";
            }

            const barQueue = document.getElementById("bar-queue");
            if (!data.queue || data.queue.length === 0) {
                barQueue.innerHTML = "<span style='opacity:0.3;'>Inga kommande låtar.</span>";
            } else {
                barQueue.innerHTML = data.queue.map((lat, index) => `
                    <div class="queue-item">
                        <span style="color:#1db954; font-weight:bold;">${index + 1}.</span>
                        <span style="flex:1;">${lat.title}</span>
                        <span style="opacity:0.4; font-size:12px;">(${lat.addedBy})</span>
                    </div>
                `).join("");
            }
        });
    </script>
</body>
</html>
